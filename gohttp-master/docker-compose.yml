version: '3.8'

services:
  gohttp:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GOHTTP_HOST=0.0.0.0
      - GOHTTP_PORT=8080
      - GOHTTP_LOG_LEVEL=info
      - GOHTTP_MAX_CONNECTIONS=200
    volumes:
      - ./config.json:/app/config.json:ro
      - ./static:/app/static:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add a load balancer for multiple instances
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gohttp
    restart: unless-stopped
    profiles:
      - production